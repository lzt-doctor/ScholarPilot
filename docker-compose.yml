services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scholarpilot-db
    environment:
      POSTGRES_USER: scholarpilot
      POSTGRES_PASSWORD: scholarpilot
      POSTGRES_DB: scholarpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarpilot -d scholarpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scholarpilot-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://scholarpilot:scholarpilot@db:5432/scholarpilot
      SECRET_KEY: scholarpilot-dev-secret
      UPLOAD_DIR: /app/uploads
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_VERSION: ${EMBEDDING_VERSION:-1}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-auto}
      ALLOW_EMBEDDING_FALLBACK: ${ALLOW_EMBEDDING_FALLBACK:-false}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-hybrid}
      RETRIEVAL_CANDIDATE_K: ${RETRIEVAL_CANDIDATE_K:-20}
      RETRIEVAL_MIN_RELEVANCE: ${RETRIEVAL_MIN_RELEVANCE:-0.25}
      HYBRID_RRF_K: ${HYBRID_RRF_K:-60}
      HYBRID_VECTOR_MODE: ${HYBRID_VECTOR_MODE:-hnsw}
      HNSW_M: ${HNSW_M:-16}
      HNSW_EF_CONSTRUCTION: ${HNSW_EF_CONSTRUCTION:-64}
      HNSW_EF_SEARCH: ${HNSW_EF_SEARCH:-40}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - ./experiments/results:/app/experiments/results
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: scholarpilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
