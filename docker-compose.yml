services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scholarpilot-db
    environment:
      POSTGRES_USER: scholarpilot
      POSTGRES_PASSWORD: scholarpilot
      POSTGRES_DB: scholarpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarpilot -d scholarpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scholarpilot-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://scholarpilot:scholarpilot@db:5432/scholarpilot
      SECRET_KEY: scholarpilot-dev-secret
      UPLOAD_DIR: /app/uploads
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-auto}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: scholarpilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
